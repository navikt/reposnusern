version: "2"
sql:
  - schema: "db/schema.sql"
    queries: "db/queries/"
    engine: "postgresql"
    gen:
      go:
        out: "internal/storage"
        package: "storage"
        overrides:
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
            nullable: true